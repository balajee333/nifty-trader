# Default config: NSE NIFTY options
# For MCX Crude Oil Mini: nifty-trader --config config/mcx-crudeoilm.yaml
strategy_mode: "credit_spread"

instrument:
  name: "NIFTY"
  security_id: "13"
  exchange_segment: "NSE_FNO"
  spot_exchange_segment: "IDX_I"
  instrument_type: "INDEX"
  lot_size: 75
  feed_code: 0
  market_open: "09:15"
  market_close: "15:30"

