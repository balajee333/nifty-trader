#     max_spread_pct: 5.0
#     iv_rank_min: 25.0

strategy:
  ema_fast: 9
  ema_slow: 21
  rsi_period: 14
  rsi_bullish_entry: 35
  rsi_bearish_entry: 65
  rsi_oversold: 30
  rsi_overbought: 70
  vwap_confirm_candles: 2
  volume_spike_multiplier: 1.5
  volume_sma_period: 20
  level_proximity_pct: 0.3
  confluence_min_score: 1.5
  signal_weights:
    ema: 1.0
    vwap: 0.8
    rsi: 0.7
    volume: 0.5
    levels: 0.5

risk:
  capital: 100000
  risk_per_trade_pct: 2.0
  daily_loss_limit_pct: 3.0
  max_positions: 1
  sl_pct: 35.0
  reward_risk_ratio: 2.0
  trailing_breakeven_pct: 50.0
  trailing_advance_pct: 75.0
  time_stop_minutes: 45
  max_single_loss_pct: 5.0

strike:
  delta_min: 0.30
  delta_max: 0.50
  delta_target: 0.40
  iv_rank_max: 80.0
  min_volume: 1000
  min_oi: 10000
  max_spread_pct: 2.0

spread:
  short_delta_min: 0.15
  short_delta_max: 0.30
  short_delta_target: 0.20
  spread_width_points: 100
  min_credit: 5.0
  profit_target_pct: 50.0
  loss_threshold_multiplier: 2.0
  min_volume: 500
  min_oi: 5000
  max_spread_pct: 3.0
  iv_rank_min: 30.0

timing:
  scan_start: "09:20"
  no_entry_after: "14:30"
  force_exit: "15:15"
  reconcile: "15:35"
  candle_interval_min: 5
  tick_interval_sec: 10

data:
  intraday_lookback_days: 5
  daily_lookback_days: 60
  ws_heartbeat_timeout_sec: 15
  rate_limit_data_per_sec: 5
  rate_limit_option_chain_sec: 3

notifications:
  telegram_enabled: false
  console_enabled: true

venom:
  ohlc_tolerance_index_pct: 5.0
  ohlc_tolerance_option_abs: 2.0
  min_confirmations: 3
  vix_full: 13.0
  vix_selective: 18.0
  vix_caution: 23.0
  vix_restricted: 30.0
  vix_blocked: 30.0
  entry_window_start: "09:16"
  entry_window_end: "14:30"
  no_trade_start: "11:30"
  no_trade_end: "13:30"
  signal_detection_end: "09:20"
  target_delta_low_vix: 0.50
  target_delta_high_vix: 0.65
  max_premium_nifty: 265.0
  max_premium_banknifty: 660.0
  sl_percent: 30.0
  trail_activation_pct: 12.0
  trail_distance_pct: 15.0
  max_profit_pct: 100.0
  time_stop_minutes: 45
  max_trades_per_day: 3
  max_daily_loss: 3000.0
  max_weekly_loss: 8000.0
  consecutive_loss_limit: 3
  mtd_protection_threshold: 12000.0
  mtd_protection_size_reduction: 0.30
  mtd_stop_threshold: -5000.0
  mtd_stop_days: 3
  mtd_resume_size_reduction: 0.50
